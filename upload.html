<!DOCTYPE html>
<html>
<head>
    <title>Upload Notes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">

    <div class="logo-box">
        <div class="logo-circle">M</div>
        <h2>Marco AI Tutor</h2>
    </div>

    <a href="dashboard.html">Dashboard</a>
    <a href="upload.html" class="active">Upload Notes</a>
    <a href="summary.html">Summary</a>
    <a href="quiz.html">Quiz Generator</a>
    <a href="tutor.html">AI Tutor</a>
    <a href="index.html">Logout</a>

    <button class="theme-toggle" onclick="toggleTheme()">
        Toggle Theme
    </button>

</div>

<div class="main">

    <div class="hero-header">
        <h1>Upload Study Material</h1>
        <p>Upload notes or paste content below for AI analysis.</p>
    </div>

    <div class="form-card">

        <label>Subject / Module Name</label>

        <input
            type="text"
            placeholder="Example: Artificial Intelligence">

        <label>Paste Notes</label>

        <textarea
            placeholder="Paste your lecture notes here...">
        </textarea>

        <label>Upload File</label>

        <input type="file">

        <button onclick="location.href='summary.html'">
            Generate Summary
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
